parameters:
  - name: sonarProjectKey
    type: string

  - name: sonarProjectName
    type: string

  - name: sonarHostUrl
    type: string
    default: "http://localhost:9000"

  - name: extraSonarProperties
    type: string
    default: ""

steps:

# --------------------------------------------------------
# Detect language (lightweight)
# --------------------------------------------------------

- bash: |
    echo "Detectando linguagem..."

    if find . -name "*.cs" | grep -q . ; then
      LANG="csharp"
    elif find . -name "*.java" | grep -q . ; then
      LANG="java"
    elif find . -name "*.ts" -o -name "*.tsx" | grep -q . ; then
      LANG="typescript"
    elif find . -name "*.js" | grep -q . ; then
      LANG="javascript"
    elif find . -name "*.py" | grep -q . ; then
      LANG="python"
    else
      LANG="generic"
    fi

    echo "Linguagem detectada: $LANG"

    echo "##vso[task.setvariable variable=DETECTED_LANGUAGE]$LANG"
  displayName: "🔎 Detect Language"

# --------------------------------------------------------
# Install Sonar Scanner (if missing)
# --------------------------------------------------------

- bash: |
    set -e

    SCANNER_DIR="$AGENT_TEMPDIRECTORY/sonar-scanner"

    if [ -f "$SCANNER_DIR/bin/sonar-scanner.bat" ]; then
      echo "Scanner já existe"
    else
      echo "Instalando sonar-scanner..."

      curl -sSL \
      https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-windows.zip \
      -o "$AGENT_TEMPDIRECTORY/sonar.zip"

      unzip -q "$AGENT_TEMPDIRECTORY/sonar.zip" -d "$AGENT_TEMPDIRECTORY"

      mv "$AGENT_TEMPDIRECTORY/sonar-scanner-5.0.1.3006-windows" "$SCANNER_DIR"
    fi

    echo "##vso[task.prependpath]$SCANNER_DIR/bin"

    echo "Scanner instalado em:"
    ls "$SCANNER_DIR/bin"

  displayName: "📦 Install SonarScanner"

# --------------------------------------------------------
# Run analysis
# --------------------------------------------------------

- bash: |
    set -e

    echo "Executando análise..."

    sonar-scanner.bat \
      -Dsonar.projectKey="${{ parameters.sonarProjectKey }}" \
      -Dsonar.projectName="${{ parameters.sonarProjectName }}" \
      -Dsonar.host.url="${{ parameters.sonarHostUrl }}" \
      -Dsonar.token="$SONAR_TOKEN" \
      -Dsonar.sources=. \
      -Dsonar.sourceEncoding=UTF-8 \
      ${{ parameters.extraSonarProperties }}

  env:
    SONAR_TOKEN: $(SONAR_TOKEN)

  displayName: "📊 Run SonarQube Analysis"

# --------------------------------------------------------
# Quality Gate
# --------------------------------------------------------

- bash: |
    set -e

    URL="${{ parameters.sonarHostUrl }}"
    PROJECT="${{ parameters.sonarProjectKey }}"

    echo "Verificando Quality Gate..."

    for i in {1..30}; do

      STATUS=$(curl -sf -u "$SONAR_TOKEN:" \
      "$URL/api/qualitygates/project_status?projectKey=$PROJECT" \
      | python3 -c "import sys,json;print(json.load(sys.stdin)['projectStatus']['status'])")

      if [ "$STATUS" != "NONE" ] && [ "$STATUS" != "PENDING" ]; then
        break
      fi

      echo "Aguardando processamento..."
      sleep 10

    done

    echo "Quality Gate: $STATUS"

    if [ "$STATUS" = "ERROR" ]; then
      echo "##vso[task.complete result=Failed;]Quality Gate FAILED"
      exit 1
    fi

    echo "Quality Gate OK"

  env:
    SONAR_TOKEN: $(SONAR_TOKEN)

  displayName: "🚦 Quality Gate"

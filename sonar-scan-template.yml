parameters:
  - name: sonarProjectKey
    type: string
  - name: sonarProjectName
    type: string
  - name: sonarHostUrl
    type: string
    default: "http://localhost:9000"
  - name: sonarTokenSecret
    type: string
    default: "SONAR_TOKEN"
  - name: buildCommand
    type: string
    default: ""
  - name: extraSonarProperties
    type: string
    default: ""
  - name: nodeVersion
    type: string
    default: "18.x"
  - name: javaVersion
    type: string
    default: "17"
  - name: dotnetVersion
    type: string
    default: "7.x"

steps:

  - bash: |
      echo "##[section]Detectando linguagem do projeto..."

      JAVA_COUNT=$(find . -name "*.java" -o -name "*.kt" -o -name "pom.xml" -o -name "build.gradle" 2>/dev/null | wc -l)
      CSHARP_COUNT=$(find . -name "*.cs" -o -name "*.csproj" -o -name "*.sln" 2>/dev/null | wc -l)
      JS_COUNT=$(find . -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" -o -name "package.json" 2>/dev/null | grep -v node_modules | wc -l)
      PYTHON_COUNT=$(find . -name "*.py" 2>/dev/null | wc -l)
      PHP_COUNT=$(find . -name "*.php" 2>/dev/null | wc -l)
      GO_COUNT=$(find . -name "*.go" 2>/dev/null | wc -l)
      RUBY_COUNT=$(find . -name "*.rb" 2>/dev/null | wc -l)
      CPP_COUNT=$(find . -name "*.cpp" -o -name "*.c" -o -name "*.h" 2>/dev/null | wc -l)

      MAX=0
      LANG="generic"
      [ "$JAVA_COUNT"   -gt "$MAX" ] && MAX=$JAVA_COUNT   && LANG="java"
      [ "$CSHARP_COUNT" -gt "$MAX" ] && MAX=$CSHARP_COUNT && LANG="csharp"
      [ "$JS_COUNT"     -gt "$MAX" ] && MAX=$JS_COUNT     && LANG="javascript"
      [ "$PYTHON_COUNT" -gt "$MAX" ] && MAX=$PYTHON_COUNT && LANG="python"
      [ "$PHP_COUNT"    -gt "$MAX" ] && MAX=$PHP_COUNT    && LANG="php"
      [ "$GO_COUNT"     -gt "$MAX" ] && MAX=$GO_COUNT     && LANG="go"
      [ "$RUBY_COUNT"   -gt "$MAX" ] && MAX=$RUBY_COUNT   && LANG="ruby"
      [ "$CPP_COUNT"    -gt "$MAX" ] && MAX=$CPP_COUNT    && LANG="cpp"

      TS_COUNT=$(find . -name "*.ts" -o -name "*.tsx" 2>/dev/null | grep -v node_modules | wc -l)
      if [ "$LANG" = "javascript" ] && [ "$TS_COUNT" -gt "0" ]; then
        LANG="typescript"
      fi

      echo "Linguagem detectada: $LANG"
      echo "##vso[task.setvariable variable=DETECTED_LANGUAGE;isOutput=true]$LANG"
      echo "##vso[task.setvariable variable=DETECTED_LANGUAGE]$LANG"
    displayName: "🔍 Detectar Linguagem do Projeto"
    name: detectLang

  - task: JavaToolInstaller@0
    condition: or(eq(variables['DETECTED_LANGUAGE'], 'java'), contains('${{ parameters.buildCommand }}', 'mvn'), contains('${{ parameters.buildCommand }}', 'gradle'))
    inputs:
      versionSpec: "${{ parameters.javaVersion }}"
      jdkArchitectureOption: "x64"
      jdkSourceOption: "PreInstalled"
    displayName: "☕ Setup Java"

  - task: NodeTool@0
    condition: or(eq(variables['DETECTED_LANGUAGE'], 'javascript'), eq(variables['DETECTED_LANGUAGE'], 'typescript'))
    inputs:
      versionSpec: "${{ parameters.nodeVersion }}"
    displayName: "🟢 Setup Node.js"

  - task: UseDotNet@2
    condition: eq(variables['DETECTED_LANGUAGE'], 'csharp')
    inputs:
      version: "${{ parameters.dotnetVersion }}"
    displayName: "🔷 Setup .NET"

  - bash: |
      set -e
      LANG="$(DETECTED_LANGUAGE)"
      CUSTOM_CMD="${{ parameters.buildCommand }}"

      if [ -n "$CUSTOM_CMD" ]; then
        eval "$CUSTOM_CMD"
        exit 0
      fi

      case "$LANG" in
        java)
          if [ -f "pom.xml" ]; then
            mvn clean verify -DskipTests --batch-mode
          elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
            chmod +x ./gradlew 2>/dev/null || true
            ./gradlew build -x test || gradle build -x test
          fi
          ;;
        csharp)
          if ls *.sln 1>/dev/null 2>&1; then
            dotnet restore && dotnet build --no-restore
          else
            find . -name "*.csproj" | head -1 | xargs dotnet build
          fi
          ;;
        javascript|typescript)
          if [ -f "package.json" ]; then
            npm ci 2>/dev/null || npm install
            grep -q '"build"' package.json && npm run build 2>/dev/null || true
          fi
          ;;
        python)
          [ -f "requirements.txt" ] && pip install -r requirements.txt
          ;;
        *)
          echo "Sem build necessário para: $LANG"
          ;;
      esac
    displayName: "🔨 Build do Projeto"

  - bash: |
      set -e
      SONAR_VERSION="5.0.1.3006"
      INSTALL_DIR="/d/sonar-scanner"

      if [ -f "$INSTALL_DIR/bin/sonar-scanner" ]; then
        echo "sonar-scanner já instalado"
        echo "##vso[task.prependpath]$INSTALL_DIR/bin"
        exit 0
      fi

      echo "Baixando sonar-scanner $SONAR_VERSION para Windows..."
      mkdir -p "$INSTALL_DIR"

      curl -sSL \
        "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_VERSION}-windows.zip" \
        -o "/tmp/sonar-scanner.zip"

      unzip -q "/tmp/sonar-scanner.zip" -d "/tmp/"
      cp -r "/tmp/sonar-scanner-${SONAR_VERSION}-windows/." "$INSTALL_DIR/"

      echo "##vso[task.prependpath]$INSTALL_DIR/bin"
      echo "Instalado em: $INSTALL_DIR"
    displayName: "📦 Instalar sonar-scanner CLI"

  - bash: |
      set -e
      export PATH="/d/sonar-scanner/bin:$PATH"

      if ! command -v sonar-scanner &>/dev/null; then
        echo "##[error]sonar-scanner não encontrado em /d/sonar-scanner/bin"
        ls /d/sonar-scanner/bin || echo "Pasta não existe"
        exit 1
      fi

      LANG="$(DETECTED_LANGUAGE)"
      PROJECT_KEY="${{ parameters.sonarProjectKey }}"
      PROJECT_NAME="${{ parameters.sonarProjectName }}"
      SONAR_URL="${{ parameters.sonarHostUrl }}"
      EXTRA="${{ parameters.extraSonarProperties }}"

      echo "Projeto:   $PROJECT_KEY"
      echo "Linguagem: $LANG"
      echo "Servidor:  $SONAR_URL"

      LANG_PROPS=""
      case "$LANG" in
        java)
          LANG_PROPS="-Dsonar.language=java"
          [ -d "target" ]        && LANG_PROPS="$LANG_PROPS -Dsonar.java.binaries=target/classes"
          [ -d "build/classes" ] && LANG_PROPS="$LANG_PROPS -Dsonar.java.binaries=build/classes"
          ;;
        csharp)     LANG_PROPS="-Dsonar.language=cs"   ;;
        javascript) LANG_PROPS="-Dsonar.language=js"   ;;
        typescript) LANG_PROPS="-Dsonar.language=ts"   ;;
        python)     LANG_PROPS="-Dsonar.language=py"   ;;
        php)        LANG_PROPS="-Dsonar.language=php"  ;;
        go)         LANG_PROPS="-Dsonar.language=go"   ;;
        ruby)       LANG_PROPS="-Dsonar.language=ruby" ;;
        cpp)        LANG_PROPS="-Dsonar.language=c++"  ;;
      esac

      sonar-scanner \
        -Dsonar.projectKey="$PROJECT_KEY" \
        -Dsonar.projectName="$PROJECT_NAME" \
        -Dsonar.host.url="$SONAR_URL" \
        -Dsonar.token="$SONAR_TOKEN" \
        -Dsonar.sources=. \
        -Dsonar.scm.provider=git \
        -Dsonar.sourceEncoding=UTF-8 \
        $LANG_PROPS \
        $EXTRA

      echo "✅ Análise concluída!"
    env:
      SONAR_TOKEN: $(SONAR_TOKEN)
    displayName: "📊 Executar Análise SonarQube"

  - bash: |
      set -e
      SONAR_URL="${{ parameters.sonarHostUrl }}"
      PROJECT_KEY="${{ parameters.sonarProjectKey }}"

      echo "Verificando Quality Gate para: $PROJECT_KEY"

      for i in $(seq 1 30); do
        RESPONSE=$(curl -sf -u "$SONAR_TOKEN:" \
          "$SONAR_URL/api/qualitygates/project_status?projectKey=$PROJECT_KEY" \
          || echo '{"projectStatus":{"status":"NONE"}}')

        STATUS=$(echo "$RESPONSE" | python3 -c \
          "import sys,json; print(json.load(sys.stdin)['projectStatus']['status'])" \
          2>/dev/null || echo "NONE")

        if [ "$STATUS" != "NONE" ] && [ "$STATUS" != "PENDING" ]; then
          break
        fi

        echo "Aguardando... ($i/30)"
        sleep 10
      done

      echo "Quality Gate: $STATUS"

      if [ "$STATUS" = "OK" ] || [ "$STATUS" = "SUCCESS" ]; then
        echo "##[section]✅ Quality Gate: PASSOU"
      elif [ "$STATUS" = "ERROR" ]; then
        echo "##vso[task.complete result=Failed;]Quality Gate FALHOU"
        exit 1
      else
        echo "##vso[task.logissue type=warning]⚠️ Status: $STATUS"
      fi

      echo "🔗 $SONAR_URL/dashboard?id=$PROJECT_KEY"
    env:
      SONAR_TOKEN: $(SONAR_TOKEN)
    displayName: "🚦 Verificar Quality Gate"

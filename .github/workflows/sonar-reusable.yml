name: SonarQube Scan - Reusable

on:
  workflow_call:
    inputs:
      sonar-project-key:
        required: true
        type: string
      sonar-project-name:
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SLACK_WEBHOOK_URL:
        required: true

jobs:
  sonar-scan:
    name: "🔍 SonarQube Scan"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📊 SonarQube Scan"
        id: sonar
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.sonar-project-key }}
            -Dsonar.projectName=${{ inputs.sonar-project-name }}
            -Dsonar.sources=.
            -Dsonar.qualitygate.wait=true

      - name: "🚦 Quality Gate"
        id: quality-gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: "📊 Buscar Métricas do SonarQube"
        id: metrics
        if: always()
        run: |
          RESPONSE=$(curl -sf -u "${{ secrets.SONAR_TOKEN }}:" \
            "${{ secrets.SONAR_HOST_URL }}/api/measures/component\
            ?component=${{ inputs.sonar-project-key }}\
            &metricKeys=bugs,vulnerabilities,code_smells,coverage,duplicated_lines_density,ncloc,security_hotspots")

          extract() {
            echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          measures = {m['metric']: m.get('value','0') for m in data['component']['measures']}
          print(measures.get('$1', '0'))
          "
          }

          echo "bugs=$(extract bugs)"                                         >> $GITHUB_OUTPUT
          echo "vulnerabilities=$(extract vulnerabilities)"                   >> $GITHUB_OUTPUT
          echo "code_smells=$(extract code_smells)"                           >> $GITHUB_OUTPUT
          echo "coverage=$(extract coverage)"                                 >> $GITHUB_OUTPUT
          echo "duplications=$(extract duplicated_lines_density)"             >> $GITHUB_OUTPUT
          echo "lines=$(extract ncloc)"                                       >> $GITHUB_OUTPUT
          echo "hotspots=$(extract security_hotspots)"                        >> $GITHUB_OUTPUT

      - name: "✅ Slack — Sucesso"
        if: success()
        run: |
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "✅ Quality Gate PASSOU"
                }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*Projeto:*\n${{ inputs.sonar-project-name }}" },
                  { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                  { "type": "mrkdwn", "text": "*Autor:*\n${{ github.actor }}" },
                  { "type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`" }
                ]
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*🐛 Bugs:*\n${{ steps.metrics.outputs.bugs }}" },
                  { "type": "mrkdwn", "text": "*🔒 Vulnerabilities:*\n${{ steps.metrics.outputs.vulnerabilities }}" },
                  { "type": "mrkdwn", "text": "*🔥 Code Smells:*\n${{ steps.metrics.outputs.code_smells }}" },
                  { "type": "mrkdwn", "text": "*🛡️ Hotspots:*\n${{ steps.metrics.outputs.hotspots }}" },
                  { "type": "mrkdwn", "text": "*📊 Coverage:*\n${{ steps.metrics.outputs.coverage }}%" },
                  { "type": "mrkdwn", "text": "*📋 Duplications:*\n${{ steps.metrics.outputs.duplications }}%" },
                  { "type": "mrkdwn", "text": "*📝 Lines:*\n${{ steps.metrics.outputs.lines }}" }
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": { "type": "plain_text", "text": "🔗 Ver no SonarQube" },
                    "url": "${{ secrets.SONAR_HOST_URL }}/dashboard?id=${{ inputs.sonar-project-key }}",
                    "style": "primary"
                  }
                ]
              }
            ]
          }'

      - name: "❌ Slack — Falha"
        if: failure()
        run: |
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "❌ Quality Gate FALHOU"
                }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*Projeto:*\n${{ inputs.sonar-project-name }}" },
                  { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                  { "type": "mrkdwn", "text": "*Autor:*\n${{ github.actor }}" },
                  { "type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`" }
                ]
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*🐛 Bugs:*\n${{ steps.metrics.outputs.bugs }}" },
                  { "type": "mrkdwn", "text": "*🔒 Vulnerabilities:*\n${{ steps.metrics.outputs.vulnerabilities }}" },
                  { "type": "mrkdwn", "text": "*🔥 Code Smells:*\n${{ steps.metrics.outputs.code_smells }}" },
                  { "type": "mrkdwn", "text": "*🛡️ Hotspots:*\n${{ steps.metrics.outputs.hotspots }}" },
                  { "type": "mrkdwn", "text": "*📊 Coverage:*\n${{ steps.metrics.outputs.coverage }}%" },
                  { "type": "mrkdwn", "text": "*📋 Duplications:*\n${{ steps.metrics.outputs.duplications }}%" }
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": { "type": "plain_text", "text": "🔗 Ver Issues" },
                    "url": "${{ secrets.SONAR_HOST_URL }}/project/issues?id=${{ inputs.sonar-project-key }}&resolved=false",
                    "style": "danger"
                  }
                ]
              }
            ]
          }'

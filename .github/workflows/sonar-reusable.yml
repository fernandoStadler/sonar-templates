name: Sonar Reusable

on:
  workflow_call:
    inputs:
      sonar-project-key:
        required: true
        type: string
      sonar-project-name:
        required: true
        type: string
      extra-sonar-properties:
        required: false
        type: string
        default: ""

    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true

    outputs:
      quality_gate_status:
        description: "Status do Quality Gate"
        value: ${{ jobs.sonar.outputs.quality_gate_status }}
      dashboard_url:
        description: "URL do dashboard do SonarQube"
        value: ${{ jobs.sonar.outputs.dashboard_url }}

jobs:
  sonar:
    runs-on: ubuntu-latest

    outputs:
      quality_gate_status: ${{ steps.quality_gate.outputs.status }}
      dashboard_url: ${{ steps.meta.outputs.dashboard_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install SonarScanner
        run: |
          set -euo pipefail
          curl -fsSL -o scanner.zip \
            https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-6.1.0.4477-linux-x64.zip
          unzip -q scanner.zip
          echo "$PWD/sonar-scanner-6.1.0.4477-linux-x64/bin" >> "$GITHUB_PATH"

      - name: Prepare metadata
        id: meta
        run: |
          echo "dashboard_url=${{ secrets.SONAR_HOST_URL }}/dashboard?id=${{ inputs.sonar-project-key }}" >> "$GITHUB_OUTPUT"

      - name: Run Sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=${{ inputs.sonar-project-key }} \
            -Dsonar.projectName=${{ inputs.sonar-project-name }} \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.token=${SONAR_TOKEN} \
            -Dsonar.sources=.

      - name: Quality Gate
        id: quality_gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          STATUS="NONE"

          for i in $(seq 1 20); do
            RESPONSE=$(curl -s -u "${SONAR_TOKEN}:" \
              "${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=${{ inputs.sonar-project-key }}")

            STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['projectStatus']['status'])" 2>/dev/null || echo NONE)

            if [ "$STATUS" != "NONE" ] && [ "$STATUS" != "PENDING" ]; then
              break
            fi

            sleep 5
          done

          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" = "ERROR" ]; then
            exit 1
          fi

name: SonarQube Scan - Reusable

on:
  workflow_call:
    inputs:
      sonar-project-key:
        required: true
        type: string
      sonar-project-name:
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SLACK_WEBHOOK_URL:
        required: true

jobs:
  sonar-scan:
    name: "🔍 SonarQube Scan"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📊 SonarQube Scan"
        id: sonar
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.sonar-project-key }}
            -Dsonar.projectName=${{ inputs.sonar-project-name }}
            -Dsonar.sources=.
            -Dsonar.qualitygate.wait=true

      - name: "🚦 Quality Gate"
        id: quality-gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: "📊 Buscar Métricas"
        id: metrics
        if: always()
        continue-on-error: true
        run: |
          sleep 10
          URL="${{ secrets.SONAR_HOST_URL }}/api/measures/component?component=${{ inputs.sonar-project-key }}&metricKeys=bugs,vulnerabilities,code_smells,coverage,duplicated_lines_density,ncloc,security_hotspots,ncloc_language_distribution"
          RESPONSE=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" "$URL" || echo '{"component":{"measures":[]}}')

          get() {
            echo "$RESPONSE" | jq -r --arg k "$1" '.component.measures[]|select(.metric==$k)|.value//"0"' 2>/dev/null || echo "0"
          }

          LANG=$(echo "$RESPONSE" | jq -r '.component.measures[]|select(.metric=="ncloc_language_distribution")|.value//"?"' 2>/dev/null | cut -d'=' -f1 | tr '[:lower:]' '[:upper:]')
          [ -z "$LANG" ] && LANG="?"

          echo "bugs=$(get bugs)"                               >> $GITHUB_OUTPUT
          echo "vulnerabilities=$(get vulnerabilities)"         >> $GITHUB_OUTPUT
          echo "code_smells=$(get code_smells)"                 >> $GITHUB_OUTPUT
          echo "coverage=$(get coverage)"                       >> $GITHUB_OUTPUT
          echo "duplications=$(get duplicated_lines_density)"   >> $GITHUB_OUTPUT
          echo "lines=$(get ncloc)"                             >> $GITHUB_OUTPUT
          echo "hotspots=$(get security_hotspots)"              >> $GITHUB_OUTPUT
          echo "language=$LANG"                                 >> $GITHUB_OUTPUT

      - name: "✅ Slack — Sucesso"
        if: success()
        run: |
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "blocks": [
              {
                "type": "header",
                "text": { "type": "plain_text", "text": "✅ Quality Gate PASSOU" }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*Projeto:*\n${{ inputs.sonar-project-name }}" },
                  { "type": "mrkdwn", "text": "*Linguagem:*\n${{ steps.metrics.outputs.language }}" },
                  { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                  { "type": "mrkdwn", "text": "*Autor:*\n${{ github.actor }}" }
                ]
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*🐛 Bugs:*\n${{ steps.metrics.outputs.bugs }}" },
                  { "type": "mrkdwn", "text": "*🔒 Vulnerabilities:*\n${{ steps.metrics.outputs.vulnerabilities }}" },
                  { "type": "mrkdwn", "text": "*🔥 Code Smells:*\n${{ steps.metrics.outputs.code_smells }}" },
                  { "type": "mrkdwn", "text": "*🛡️ Hotspots:*\n${{ steps.metrics.outputs.hotspots }}" },
                  { "type": "mrkdwn", "text": "*📊 Coverage:*\n${{ steps.metrics.outputs.coverage }}%" },
                  { "type": "mrkdwn", "text": "*📋 Duplications:*\n${{ steps.metrics.outputs.duplications }}%" },
                  { "type": "mrkdwn", "text": "*📝 Lines:*\n${{ steps.metrics.outputs.lines }}" }
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": { "type": "plain_text", "text": "🔗 Ver no SonarQube" },
                    "url": "${{ secrets.SONAR_HOST_URL }}/dashboard?id=${{ inputs.sonar-project-key }}",
                    "style": "primary"
                  }
                ]
              }
            ]
          }'

      - name: "❌ Slack — Falha"
        if: failure()
        run: |
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "blocks": [
              {
                "type": "header",
                "text": { "type": "plain_text", "text": "❌ Quality Gate FALHOU" }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*Projeto:*\n${{ inputs.sonar-project-name }}" },
                  { "type": "mrkdwn", "text": "*Linguagem:*\n${{ steps.metrics.outputs.language }}" },
                  { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                  { "type": "mrkdwn", "text": "*Autor:*\n${{ github.actor }}" }
                ]
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*🐛 Bugs:*\n${{ steps.metrics.outputs.bugs }}" },
                  { "type": "mrkdwn", "text": "*🔒 Vulnerabilities:*\n${{ steps.metrics.outputs.vulnerabilities }}" },
                  { "type": "mrkdwn", "text": "*🔥 Code Smells:*\n${{ steps.metrics.outputs.code_smells }}" },
                  { "type": "mrkdwn", "text": "*🛡️ Hotspots:*\n${{ steps.metrics.outputs.hotspots }}" },
                  { "type": "mrkdwn", "text": "*📊 Coverage:*\n${{ steps.metrics.outputs.coverage }}%" },
                  { "type": "mrkdwn", "text": "*📋 Duplications:*\n${{ steps.metrics.outputs.duplications }}%" }
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": { "type": "plain_text", "text": "🔗 Ver Issues" },
                    "url": "${{ secrets.SONAR_HOST_URL }}/project/issues?id=${{ inputs.sonar-project-key }}&resolved=false",
                    "style": "danger"
                  }
                ]
              }
            ]
          }'
